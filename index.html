<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Lưu Trữ Anime Của Chiến Thần</title> 
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* ================= 1. NỀN KHÔNG GIAN BÊN DƯỚI ================= */
        body {
            margin: 0; padding: 0;
            font-family: 'Nunito', sans-serif; 
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat top center;
            z-index: -1; opacity: 0.5;
        }

        /* ================= 2. BANNER & CHỮ NHẸ NHÀNG CHILL CHILL ================= */
        .hero-banner {
            text-align: center;
            padding: 100px 20px;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.8)), 
                        url('https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=2000&auto=format&fit=crop') center/cover;
            border-bottom: 2px solid #2a3342;
        }
        .hero-banner h1 {
            font-family: 'Dancing Script', cursive; /* Phông chữ uốn lượn thanh lịch dcm */
            font-size: 4.5rem;
            font-weight: 700;
            margin: 0;
            color: #dca7ff; /* Màu tím pastel nhẹ nhàng giống ảnh sếp gửi */
            text-shadow: 2px 4px 10px rgba(0,0,0,0.5); /* Bóng đổ mềm để chữ dễ đọc trên nền ảnh */
            letter-spacing: 1px;
            text-transform: none; /* Để nguyên chữ hoa chữ thường cho nó tự nhiên */
        }

        /* ================= 3. LƯỚI ANIME RESPONSIVE ================= */
        .container {
            max-width: 1200px; margin: 40px auto; padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            .hero-banner h1 { font-size: 3rem; }
        }

        .anime-card {
            background-color: #161b22; border-radius: 15px;
            overflow: hidden; position: relative; cursor: pointer;
            transition: all 0.3s ease; border: 2px solid #30363d;
        }
        
        /* TRẢ LẠI HIỆU ỨNG SÁNG XUNG QUANH KHI DI CHUỘT DCM */
        .anime-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 0 25px #00e5ff; /* Sáng Glow màu xanh dương */
            border-color: #00e5ff;
        }

        .anime-img { width: 100%; height: 400px; object-fit: cover; }
        .anime-info { padding: 15px; text-align: center; }
        .anime-title { font-size: 1.3rem; margin: 0 0 10px 0; color: #e6edf3; font-weight: bold;}
        
        .badge-container { position: absolute; top: 10px; left: 10px; display: flex; flex-direction: column; gap: 5px; }
        .badge { background: #dca7ff; color: #000; padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; }
        .badge.blue { background: #00e5ff; color: #000;}

        /* ================= 4. MODAL & THẺ BÀI NHÂN VẬT VUỐT NGANG ================= */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 12, 16, 0.95); z-index: 1000;
            justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.3s;
        }
        .modal.active { display: flex; opacity: 1; }
        
        .modal-content {
            width: 100%; max-width: 450px; 
            background: transparent;
            position: relative;
        }

        .close-btn {
            position: absolute; top: -50px; right: 10px; font-size: 2.5rem; color: #8b949e;
            cursor: pointer; z-index: 10; transition: color 0.2s;
        }
        .close-btn:hover { color: #fff; }

        .slider-container {
            display: flex; overflow-x: auto;
            scroll-snap-type: x mandatory; scroll-behavior: smooth;
            -ms-overflow-style: none; scrollbar-width: none; 
        }
        .slider-container::-webkit-scrollbar { display: none; }

        .char-slide {
            flex: 0 0 100%; scroll-snap-align: center;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px 0; /* Tăng padding để lấy chỗ cho bóng đổ */
        }

        /* KHUNG NHÂN VẬT: BỎ VIỀN, NỔI BẬT LÊN BẰNG SHADOW NHƯ ẢNH DCM */
        .char-card-box {
            background: #1e2130; /* Nền xám nhạt hơn màu modal để tạo cảm giác nổi */
            padding: 20px;
            border-radius: 16px;
            border: none; /* DIỆT GỌN CÁI VIỀN ĐỎ QUÊ MÙA KKK */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6); /* Đổ bóng mềm phía dưới làm thẻ nổi lềnh phềnh */
            text-align: center;
            width: 90%;
        }

        .char-img-vertical {
            width: 100%; height: 350px; object-fit: cover;
            border-radius: 10px;
            border: none; /* Bỏ viền ảnh luôn cho mượt */
            box-shadow: 0 5px 15px rgba(0,0,0,0.4); /* Ảnh cũng nổi nhẹ trên thẻ */
            margin-bottom: 15px;
            background-color: #0d1117; 
        }

        .char-name {
            font-family: 'Nunito', sans-serif;
            font-size: 1.8rem;
            color: #dca7ff; /* Đổi màu chữ theo tone pastel cho đồng bộ */
            font-weight: bold;
            margin-bottom: 15px;
        }

        .audio-player-box {
            width: 100%;
            background: #141722; /* Màu đậm hơn nền thẻ một tí tạo chiều sâu */
            padding: 12px;
            border-radius: 10px;
            border: none;
            box-sizing: border-box;
        }
        .audio-player-box p { margin: 0 0 10px 0; color: #a1aab8; font-weight: bold; font-size: 0.9rem;}
        
        audio { width: 100%; outline: none; height: 35px; border-radius: 20px;}

        .swipe-hint {
            text-align: center; color: #8b949e; margin-top: 5px; font-size: 0.9rem;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateX(0);}
            40% {transform: translateX(10px);}
            60% {transform: translateX(5px);}
        }
        .hot-list {
    position: fixed;
    bottom: 20px;       /* Đưa xuống dưới */
    right: 20px;        /* Căn sang phải */
    width: 160px;       /* Thu nhỏ chiều ngang */
    background: rgba(10, 12, 16, 0.85); /* Nền hơi trong suốt tí cho sang */
    padding: 10px;
    border-radius: 12px;
    border: none;       /* BỎ VIỀN XANH DCM */
    z-index: 9999;
    box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5); /* Đổ bóng nhẹ thay cho viền */
}

.hot-list h3 {
    font-size: 0.9rem;  /* Chữ nhỏ lại */
    margin: 0 0 8px 0;
    text-align: center;
    color: #dca7ff;
}

.hot-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    cursor: pointer;
    font-size: 0.8rem; /* Chữ nhỏ để không che nội dung */
}

.hot-item img {
    width: 35px;        /* Ảnh nhỏ xinh */
    height: 35px;
    object-fit: cover;
    border-radius: 6px;
}

.hot-list {
    position: fixed;
    bottom: 20px; right: 20px;
    z-index: 9999;
    cursor: move; /* Để sếp biết chỗ này cầm kéo được */
    background: rgba(22, 27, 34, 0.9);
    padding: 10px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    user-select: none;
    width: 160px;
}
.hot-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; cursor: pointer; }
.hot-item img { width: 35px; height: 35px; object-fit: cover; border-radius: 6px; } 

        /* Thêm vào trong thẻ <style> của sếp */

#controls {
    display: flex;
    justify-content: flex-end; /* Đẩy nội dung (lửa + X) sang phải */
    align-items: center;
    gap: 10px;
    cursor: pointer; /* Cho biết chỗ này nhấn được */
    padding: 5px;
}

#widget-content {
    transition: display 0.3s; /* Tạo hiệu ứng mượt khi ẩn hiện */
}

#hot-widget {
    touch-action: none; /* Quan trọng: Chặn cuộn trang khi kéo widget */
    position: fixed;
    z-index: 9999; /* Luôn nổi trên cùng, không bị đè bởi ảnh khác */
    background: rgba(0, 0, 0, 0.8); /* Màu nền cho đẹp */
    border-radius: 10px;
    padding: 10px;
}
#hot-widget {
    position: fixed;
    z-index: 9999;
    background: rgba(22, 27, 34, 0.9);
    padding: 10px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    touch-action: none; 
    transition: width 0.3s ease; /* Mượt mà khi đóng/mở */
    right: 10px; /* Mặc định dính phải */
    bottom: 20px;
}

#hot-widget {
    position: fixed;
    z-index: 9999;
    /* Các thuộc tính sếp đang dùng như background, padding, v.v... */
    
    /* Dòng này cực kỳ quan trọng để đảm bảo nó "nhạy" click */
    pointer-events: auto; 
    
    /* Thêm cái này để tránh việc nó chiếm dụng toàn bộ không gian (nếu cần) */
    /* Chỉ khi nào sếp muốn click xuyên qua cái widget thì mới để là none, 
       nhưng ở đây sếp muốn tương tác nên phải là auto */
}
        
    </style>
</head>
<body>

<div class="stars"></div>

<div class="hero-banner">
    <h1>Tổng hợp Anime đã xem</h1>
</div>

<div class="container">
    <div class="anime-card" onclick="openModal('animeModal')">
        <div class="badge-container">
            <span class="badge">13/13 Tập</span>
            <span class="badge blue">Đang đợi Part 3</span>
        </div>
        <img class="anime-img" src="https://images.unsplash.com/photo-1541562232579-512a21360020?q=80&w=600&auto=format&fit=crop" alt="Poster">
        <div class="anime-info">
            <h3 class="anime-title">Nijigasaki High School Idol Club</h3>
            <p style="margin:0; font-size: 0.9rem; color: #8b949e;">Nhấp vào để xem chi tiết</p>
        </div>
    </div>
</div>

<div class="modal" id="animeModal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">✖</span>
        
        <div class="slider-container">
            
            <div class="char-slide">
                <div class="char-card-box">
                    <img class="char-img-vertical" src="https://images.unsplash.com/photo-1580477667995-2b92f6f7b582?q=80&w=400&h=600&auto=format&fit=crop" alt="Lanzhu">
                    <div class="char-name">Lanzhu Zhong</div>
                    <div class="audio-player-box">
                        <p>🎵 Nhạc của Lanzhu:</p>
                        <audio controls class="char-audio">
                            <source src="link_nhac_lanzhu.mp3" type="audio/mpeg">
                        </audio>
                    </div>
                </div>
            </div>

            <div class="char-slide">
                <div class="char-card-box">
                    <img class="char-img-vertical" src="https://images.unsplash.com/photo-1618641986557-1ecd230959aa?q=80&w=400&h=600&auto=format&fit=crop" alt="Karin">
                    <div class="char-name">Karin Asaka</div>
                    <div class="audio-player-box">
                        <p>🎵 Nhạc của Karin:</p>
                        <audio controls class="char-audio">
                            <source src="link_nhac_karin.mp3" type="audio/mpeg">
                        </audio>
                    </div>
                </div>
            </div>

        </div>
        
        <div class="swipe-hint">Kéo / Vuốt sang trái để lật thẻ tiếp theo ➔</div>
    </div>
</div>

    <!-- Bọc toàn bộ cái bảng cũ vào đây -->
<div id="hot-widget" class="hot-list">
    
    <!-- Nút "Điều khiển" đặt trên cùng -->
    <div id="controls" style="text-align: right; cursor: pointer; padding-bottom: 5px;">
        <span onclick="toggleWidget()">🔥 / ✕</span>
    </div>

    <!-- Nội dung bảng cũ của sếp -->
    <div id="widget-content">
        <h3>🔥 Hot Anime</h3>
        
        <div class="hot-item" onclick="openModal('animeModal')">
            <img src="https://images.unsplash.com/photo-1541562232579-512a21360020?q=80&w=100" alt="Niji">
            <span>Nijigasaki</span>
        </div>

        <div class="hot-item" onclick="openModal('ID_BO_2')">
            <img src="LINK_ẢNH_BO_2" alt="Anime">
            <span>Tên bộ 2</span>
        </div>

        <div class="hot-item" onclick="openModal('ID_BO_3')">
            <img src="LINK_ẢNH_BO_3" alt="Anime">
            <span>Tên bộ 3</span>
        </div>
    </div>
</div>

<script>
    // --- 1. MODAL & NHẠC ---
    let currentModalId = ''; 
    function openModal(modalId) {
        currentModalId = modalId;
        document.getElementById(modalId).classList.add('active');
    }
    function closeModal() {
        if(!currentModalId) return;
        let modal = document.getElementById(currentModalId);
        modal.classList.remove('active');
        const audios = modal.querySelectorAll('.char-audio');
        audios.forEach(audio => { audio.pause(); audio.currentTime = 0; });
        currentModalId = '';
    }
    window.onclick = (e) => {
        if (currentModalId && e.target == document.getElementById(currentModalId)) closeModal();
    };

    // --- 2. WIDGET KÉO THẢ (FIX LỖI KÉO SLIDER) ---
    const widget = document.getElementById('hot-widget');
    const content = document.getElementById('widget-content');
    const header = document.getElementById('controls');

    function toggleWidget() {
        if (content.style.display === 'none') {
            content.style.display = 'block';
            widget.style.width = '160px';
        } else {
            content.style.display = 'none';
            widget.style.width = 'auto';
        }
    }

    let isDragging = false;
    let offsetX, offsetY;

    // CHỈ KÉO KHI NHẤN VÀO HEADER
    header.addEventListener('mousedown', (e) => {
        isDragging = true;
        offsetX = e.clientX - widget.offsetLeft;
        offsetY = e.clientY - widget.offsetTop;
    });

    header.addEventListener('touchstart', (e) => {
        isDragging = true;
        offsetX = e.touches[0].clientX - widget.offsetLeft;
        offsetY = e.touches[0].clientY - widget.offsetTop;
    }, {passive: false});

    // SỬA CHỖ NÀY: Dùng window thay vì document để bắt sự kiện chuẩn hơn
    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return; // Nếu không nhấn vào header thì KHÔNG LÀM GÌ CẢ
        // e.preventDefault()
        widget.style.left = (e.clientX - offsetX) + 'px';
        widget.style.top = (e.clientY - offsetY) + 'px';
        widget.style.right = 'auto'; widget.style.bottom = 'auto';
    });

    window.addEventListener('touchmove', (e) => {
        if (!isDragging) return; // Nếu không nhấn vào header thì để slider hoạt động
        widget.style.left = (e.touches[0].clientX - offsetX) + 'px';
        widget.style.top = (e.touches[0].clientY - offsetY) + 'px';
        widget.style.right = 'auto'; widget.style.bottom = 'auto';
    }, {passive: false});

    window.addEventListener('mouseup', stopDrag);
    window.addEventListener('touchend', stopDrag);

    function stopDrag() {
        if (!isDragging) return;
        isDragging = false;
        let winW = window.innerWidth;
        if (widget.offsetLeft + widget.offsetWidth / 2 > winW / 2) {
            widget.style.left = (winW - widget.offsetWidth - 10) + 'px';
        } else {
            widget.style.left = '10px';
        }
        widget.style.right = 'auto';
    }
</script>
 </body>
</html>
